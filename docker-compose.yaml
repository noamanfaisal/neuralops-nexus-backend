services:
  # NUCLEUS: The Orchestrator
  nucleus:
    image: nexus-backend:3.0
    container_name: nexus-nucleus
    # build:
    #   context: ./modules/nexus-nucleus
    #   dockerfile: ./docker/dev/Dockerfile.nexus-nucleus
    ports:
      - "8003:8000"
    volumes:
      - ./modules/nexus-nucleus:/nexus-nucleus
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_URL=${POSTGRES_URL}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - NEXUS_AI_URL=${NEXUS_AI_URL}
      - CENTRIFUGO_API_URL=${CENTRIFUGO_API_URL}
      - CENTRIFUGO_API_KEY=${CENTRIFUGO_API_KEY}
      - CENTRIFUGO_HMAC_SECRET=${CENTRIFUGO_HMAC_SECRET}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - NEURALOPS_INSTALL_TOKEN=${NEURALOPS_INSTALL_TOKEN}
      - SUPABASE_DEVICE_POLL_URL=${SUPABASE_DEVICE_POLL_URL}
      - SUPABASE_DEVICE_REQUEST_URL=${SUPABASE_DEVICE_REQUEST_URL}
      - NEURALOPS_PORTAL_URL=${NEURALOPS_PORTAL_URL:-https://neuralops-nexus-auth.mapax.io}
      - PYTHONPATH=/nexus-nucleus
      - AI_PROVIDER=${AI_PROVIDER}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_API_BASE=${OLLAMA_API_BASE}
      - AIDER_MODEL=${AIDER_MODEL}
      - OPENAI_API_BASE=${OPENAI_API_BASE}
      - AIDER_MAP_TOKENS=${AIDER_MAP_TOKENS}
    networks:
      - nexus-network
    depends_on:
      - postgres
      - redis
      - realtime
    working_dir: /nexus-nucleus
    command: tail -f /dev/null

  # CELERY WORKER: Background Tasks
  nucleus-celery:
    image: nexus-backend:3.0
    container_name: nexus-celery
    volumes:
      - ./modules/nexus-nucleus:/nexus-nucleus
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_URL=${POSTGRES_URL}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - NEURALOPS_INSTALL_TOKEN=${NEURALOPS_INSTALL_TOKEN}
      - SUPABASE_DEVICE_POLL_URL=${SUPABASE_DEVICE_POLL_URL}
      - SUPABASE_DEVICE_REQUEST_URL=${SUPABASE_DEVICE_REQUEST_URL}
      - NEURALOPS_PORTAL_URL=${NEURALOPS_PORTAL_URL:-https://neuralops-nexus-auth.mapax.io}
      - PYTHONPATH=/nexus-nucleus
    networks:
      - nexus-network
    depends_on:
      - postgres
      - redis
    working_dir: /nexus-nucleus
    command: tail -f /dev/null
    restart: unless-stopped

  # REDIS: Celery Broker & Result Backend
  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis_data:/data
    networks:
      - nexus-network
    restart: unless-stopped

  # NEXUS-AI: The Worker
  nexus-ai:
    image: nexus-ai:2.0
    container_name: nexus-ai
    build:
      context: ./modules/nexus-ai
      dockerfile: ./docker/dev/Dockerfile.nexus-ai
    ports:
      - "8000:8000"
    volumes:
      - ./modules/nexus-ai:/nexus-ai
    environment:
      - CHROMA_HOST=${CHROMA_HOST}
      - CHROMA_PORT=${CHROMA_PORT}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MODEL_NAME=${MODEL_NAME}
      - PYTHONPATH=/nexus-ai
    networks:
      - nexus-network
    depends_on:
      - chromadb
    working_dir: /nexus-ai
    command: >
      sh -c "export PYTHONPATH=$PYTHONPATH:/nexus-ai && 
             python3 -m uvicorn apps.main:app --host 0.0.0.0 --port 8000 --reload"

  # REALTIME: Transport
  realtime:
    image: noamanfaisal/nexus-transport:6.0
    container_name: nexus-transport
    ports:
      - "8002:8000"
    environment:
      - CENTRIFUGO_TOKEN_HMAC_SECRET=${CENTRIFUGO_HMAC_SECRET}
      - CENTRIFUGO_HTTP_API_KEY=${CENTRIFUGO_API_KEY}
    command: >
      nexus-transport 
      --admin.enabled 
      --admin.insecure
    networks:
      - nexus-network

  # CHROMADB & POSTGRES remain the same...
  chromadb:
    image: chromadb/chroma:latest
    container_name: nexus-chroma
    volumes:
      - ./data/chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
    networks:
      - nexus-network

  postgres:
    image: postgres:17-alpine
    container_name: nexus-postgres
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - ./data/postgres_data:/var/lib/postgresql/data
    networks:
      - nexus-network

  # NEURALOPS FRONTEND: The UI
  neuralops-frontend:
    build:
      context: ./modules/neuralops-frontend
      dockerfile: Dockerfile
    container_name: neuralops-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./modules/neuralops-frontend:/app
    environment:
      - VITE_API_URL=${NEURALOPS_API_URL:-http://localhost:8003}
    networks:
      - nexus-network
    depends_on:
      - nucleus
    restart: unless-stopped

networks:
  nexus-network:
    driver: bridge
