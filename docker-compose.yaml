services:
  # NUCLEUS: The Orchestrator
  nucleus:
    image: neuralops-backend:3.0
    container_name: nexus-nucleus
    build:
      context: ./modules/nexus-nucleus
      dockerfile: ./docker/dev/Dockerfile.nexus-nucleus
    ports:
      - "8003:8000"
    volumes:
      - ./modules/nexus-nucleus:/nexus-nucleus
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_URL=${POSTGRES_URL}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - NEXUS_AI_URL=${NEXUS_AI_URL}
      - CENTRIFUGO_API_URL=${CENTRIFUGO_API_URL}
      - CENTRIFUGO_API_KEY=${CENTRIFUGO_API_KEY}
      - CENTRIFUGO_HMAC_SECRET=${CENTRIFUGO_HMAC_SECRET}
      - PYTHONPATH=/nexus-nucleus
    networks:
      - nexus-network
    depends_on:
      - postgres
      - realtime
    working_dir: /nexus-nucleus
    # command: ["python", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--proxy-headers"]
    # command: python -m uvicorn apps.main:app --host 0.0.0.0 --port 8000 --reload
    command: tail -f /dev/null
  # NEXUS-AI: The Worker
  nexus-ai:
    image: nexus-ai:2.0
    container_name: nexus-ai
    build:
      context: ./modules/nexus-ai
      dockerfile: ./docker/dev/Dockerfile.nexus-ai
    ports:
      - "8000:8000"
    volumes:
      - ./modules/nexus-ai:/nexus-ai
    environment:
      - CHROMA_HOST=${CHROMA_HOST}
      - CHROMA_PORT=${CHROMA_PORT}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MODEL_NAME=${MODEL_NAME}
      - PYTHONPATH=/nexus-ai
    networks:
      - nexus-network
    depends_on:
      - chromadb
    working_dir: /nexus-ai
    # command: ["python", "-m", "uvicorn","-m","app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    # command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    command: >
      sh -c "export PYTHONPATH=$PYTHONPATH:/nexus-ai && 
             python3 -m uvicorn apps.main:app --host 0.0.0.0 --port 8000 --reload"
  # REALTIME: Transport
  realtime:
    image: noamanfaisal/nexus-transport:6.0
    container_name: nexus-transport
    # build:
    #   context: ./modules/nexus-transport
    #   dockerfile: Dockerfile.arm64 for arm64
    #   dockerfile: Dockerfile
    ports:
      - "8002:8000"
    environment:
      - CENTRIFUGO_TOKEN_HMAC_SECRET=${CENTRIFUGO_HMAC_SECRET}
      - CENTRIFUGO_HTTP_API_KEY=${CENTRIFUGO_API_KEY}
    command: >
      nexus-transport 
      --admin.enabled 
      --admin.insecure
    networks:
      - nexus-network

  # CHROMADB & POSTGRES remain the same...
  chromadb:
    image: chromadb/chroma:latest
    container_name: nexus-chroma
    volumes:
      - ./data/chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
    networks:
      - nexus-network
  postgres:
    image: postgres:16
    container_name: nexus-postgres
    restart: always
    environment:
      # Using the same variable names as your web service for consistency
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      
    ports:
      - "5433:5432"
    volumes:
      - ./data/postgres_data:/var/lib/postgresql/data
    networks:
      - nexus-network

networks:
  nexus-network:
    driver: bridge
